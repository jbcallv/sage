<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="760" viewBox="0 0 1080 760" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#444"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1080" height="760" fill="#ffffff"/>

  <text x="540" y="40" text-anchor="middle" font-size="23" font-weight="bold" fill="#1a1a1a">Current System — Single Proxy (before any changes)</text>
  <text x="540" y="64" text-anchor="middle" font-size="13" fill="#666">Agents make normal HTTP calls; the kernel transparently redirects them through one proxy, which enforces macaroon &#8745; Cedar.</text>

  <!-- Docker host -->
  <rect x="24" y="84" width="1032" height="648" rx="16" fill="#fafafa" stroke="#cccccc"/>
  <text x="44" y="110" font-size="13" font-weight="bold" fill="#888">Docker host</text>

  <!-- agent-net -->
  <rect x="52" y="132" width="288" height="346" rx="10" fill="#edf3ff" stroke="#5b86d6"/>
  <text x="68" y="156" font-size="13" font-weight="bold" fill="#34508c">agent-net (bridge)</text>

  <rect x="72" y="170" width="248" height="56" rx="8" fill="#ffffff" stroke="#3f6fc4"/>
  <text x="196" y="194" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a1a">orchestrator</text>
  <text x="196" y="212" text-anchor="middle" font-size="11" fill="#777">agent A1</text>

  <rect x="72" y="240" width="248" height="56" rx="8" fill="#ffffff" stroke="#3f6fc4"/>
  <text x="196" y="264" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a1a">worker</text>
  <text x="196" y="282" text-anchor="middle" font-size="11" fill="#777">sub-agent (the confused deputy)</text>

  <rect x="72" y="310" width="248" height="56" rx="8" fill="#ffffff" stroke="#3f6fc4"/>
  <text x="196" y="334" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a1a">stub-target</text>
  <text x="196" y="352" text-anchor="middle" font-size="11" fill="#777">stands in for a service</text>

  <text x="68" y="404" font-size="11" fill="#34508c">calls leave as ordinary HTTP —</text>
  <text x="68" y="420" font-size="11" fill="#34508c">no proxy settings in the agent</text>

  <!-- iptables / kernel -->
  <rect x="392" y="250" width="158" height="100" rx="10" fill="#fdeaea" stroke="#d9534f"/>
  <text x="471" y="286" text-anchor="middle" font-size="14" font-weight="bold" fill="#9c2b25">iptables DNAT</text>
  <text x="471" y="306" text-anchor="middle" font-size="11" fill="#9c2b25">Linux kernel (L3/L4)</text>
  <text x="471" y="324" text-anchor="middle" font-size="11" fill="#9c2b25">all agent TCP &#8594; proxy:8080</text>

  <!-- proxy -->
  <rect x="600" y="196" width="250" height="244" rx="10" fill="#e9f9ef" stroke="#2fa84f"/>
  <text x="620" y="222" font-size="15" font-weight="bold" fill="#1a1a1a">PROXY  :8080</text>
  <text x="620" y="240" font-size="11" font-style="italic" fill="#2c7a43">application layer (L7)</text>
  <text x="620" y="268" font-size="11.5" fill="#222">&#8226; identify caller by source IP</text>
  <text x="620" y="290" font-size="11.5" fill="#222">&#8226; verify macaroon signature</text>
  <text x="620" y="312" font-size="11.5" fill="#222">&#8226; evaluate Cedar policy</text>
  <text x="620" y="334" font-size="11.5" fill="#222">&#8226; both ok &#8594; attach x-macaroon,</text>
  <text x="632" y="350" font-size="11.5" fill="#222">x-agent-principal, then forward</text>
  <text x="620" y="372" font-size="11.5" fill="#222">&#8226; else &#8594; 403 (never forwarded)</text>
  <text x="620" y="404" font-size="11" font-weight="bold" fill="#2c7a43">decision = macaroon &#8745; policy</text>

  <!-- destination -->
  <rect x="900" y="250" width="146" height="100" rx="10" fill="#f3eefb" stroke="#8e6fc4"/>
  <text x="973" y="288" text-anchor="middle" font-size="13" font-weight="bold" fill="#5a3f86">destination</text>
  <text x="973" y="307" text-anchor="middle" font-size="11" fill="#5a3f86">stub-target /</text>
  <text x="973" y="323" text-anchor="middle" font-size="11" fill="#5a3f86">external API (proxy-net)</text>

  <!-- Tetragon + listener -->
  <rect x="392" y="528" width="158" height="74" rx="10" fill="#fff6e0" stroke="#d9a534"/>
  <text x="471" y="560" text-anchor="middle" font-size="13" font-weight="bold" fill="#8a6a16">Tetragon (eBPF)</text>
  <text x="471" y="579" text-anchor="middle" font-size="11" fill="#8a6a16">watches container execs</text>

  <rect x="600" y="528" width="158" height="74" rx="10" fill="#fff6e0" stroke="#d9a534"/>
  <text x="679" y="560" text-anchor="middle" font-size="13" font-weight="bold" fill="#8a6a16">listener (host)</text>
  <text x="679" y="579" text-anchor="middle" font-size="11" fill="#8a6a16">mints root macaroon</text>

  <!-- request-flow arrows -->
  <line x1="340" y1="300" x2="388" y2="300" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="550" y1="300" x2="596" y2="312" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="850" y1="300" x2="896" y2="300" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- step badges -->
  <circle cx="364" cy="286" r="12" fill="#333"/><text x="364" y="290" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">1</text>
  <circle cx="573" cy="284" r="12" fill="#333"/><text x="573" y="288" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">2</text>
  <circle cx="873" cy="284" r="12" fill="#333"/><text x="873" y="288" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">3</text>

  <text x="300" y="276" text-anchor="middle" font-size="10.5" fill="#555">normal call</text>
  <text x="573" y="262" text-anchor="middle" font-size="10.5" fill="#555">DNAT redirect</text>
  <text x="873" y="262" text-anchor="middle" font-size="10.5" fill="#555">allow &#8594; forward</text>

  <!-- bootstrap arrows -->
  <line x1="550" y1="565" x2="596" y2="565" stroke="#d9a534" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="573" y="555" text-anchor="middle" font-size="10.5" fill="#8a6a16">exec events</text>
  <line x1="679" y1="528" x2="679" y2="444" stroke="#d9a534" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <text x="690" y="494" font-size="10.5" fill="#8a6a16">POST /api/bootstrap</text>
  <text x="690" y="508" font-size="10.5" fill="#8a6a16">IP &#8594; {principal, macaroon}</text>

  <!-- legend: confused deputy -->
  <rect x="820" y="470" width="226" height="132" rx="10" fill="#ffffff" stroke="#cccccc"/>
  <text x="836" y="492" font-size="12" font-weight="bold" fill="#1a1a1a">Confused-deputy outcome</text>
  <text x="836" y="514" font-size="11" fill="#333">orchestrator &#8594; worker: allowed</text>
  <text x="836" y="532" font-size="11" fill="#333">worker &#8594; /admin/secret-data:</text>
  <text x="836" y="550" font-size="11" font-weight="bold" fill="#9c2b25">DENY (token=ok, policy=NO) &#8594; 403</text>
  <text x="836" y="572" font-size="11" fill="#333">blocked on authorization,</text>
  <text x="836" y="588" font-size="11" fill="#333">not on network reachability</text>

  <!-- layer caption -->
  <text x="44" y="712" font-size="11.5" fill="#888">Interception = kernel network layer (L3/L4) &#160;&#183;&#160; Identity = kernel process layer (Tetragon) &#160;&#183;&#160; Authorization = application layer (L7, the proxy)</text>
</svg>
